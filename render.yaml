# Render blueprint. In Render: New → Blueprint → point at this repo.
# This repo's root IS the API, so no rootDir is needed.
# Free tier sleeps after ~15 min idle; the first request then takes ~30s to wake.
services:
  - type: web
    name: reeffocus-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      # Paste your Neon connection string in the Render dashboard (do not commit it)
      - key: DATABASE_URL
        sync: false
